name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target: testpypi or pypi"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi
      bump_type:
        description: "Version part to bump"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi')
    concurrency:
      group: testpypi-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/fluxly

    steps:
      - name: Checkout repo (full history for hatch-vcs)
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Install build environment
        run: pixi install --environment build

      - name: Build TestPyPI distribution
        run: |
          VERSION="$(pixi run python .github/scripts/compute_next_version.py --testpypi-dev --run-number "$GITHUB_RUN_NUMBER")"
          pixi run -e build hatch version "$VERSION"
          pixi run -e build hatch build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi'
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/fluxly
      
    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install Pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Install build environment
        run: pixi install --environment build

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
      
      - name: Determine next release version
        id: versioning
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump_type || 'patch' }}"
          LATEST_TAG="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
          echo "Latest release tag: ${LATEST_TAG:-none}"
          NEXT_VERSION="$(pixi run python .github/scripts/compute_next_version.py --latest-tag --bump "$BUMP_TYPE")"
          echo "Next version: $NEXT_VERSION"
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push Git tag
        run: |
          git tag -a "v${{ steps.versioning.outputs.version }}" -m "Release v${{ steps.versioning.outputs.version }}"
          git push origin "v${{ steps.versioning.outputs.version }}"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.versioning.outputs.version }}
          release_name: Fluxly ${{ steps.versioning.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Build distribution (release)
        run: |
          pixi run -e build hatch version "${{ steps.versioning.outputs.version }}"
          pixi run -e build hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
